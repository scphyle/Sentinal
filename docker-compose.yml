services:
  db:
    image: postgres:16-alpine
    container_name: sentinal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentinal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinal}
      POSTGRES_DB: ${POSTGRES_DB:-sentinal}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinal}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinal-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB:-sentinal};Username=${POSTGRES_USER:-sentinal};Password=${POSTGRES_PASSWORD:-sentinal}"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: Sentinal
      Jwt__Audience: SentinalUsers
      FileStorage__StorageProvider: ${FILE_STORAGE_PROVIDER:-Local}
      FileStorage__BasePath: /data/files
      FileStorage__AzureConnectionString: ${AZURE_STORAGE_CONNECTION_STRING:-}
      FileStorage__AzureContainerName: ${AZURE_STORAGE_CONTAINER_NAME:-}
    ports:
      - "5230:8080"
    volumes:
      - file_storage:/data/files

volumes:
  pgdata:
  file_storage: