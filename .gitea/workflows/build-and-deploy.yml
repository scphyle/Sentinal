name: Build and Test Sentinal

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: git clone --depth 1 --branch ${{ github.ref_name }} https://chas:${{ secrets.TOKEN_FOR_RUNNER }}@git.tazhome.net/chas/Sentinal.git .

      - name: Build React App
        run: |
          cd sentinal-ui
          npm install
          npm run build
          cp -r dist/* ../src/Sentinal.Api/wwwroot/

      - name: Run Tests
        run: |
          dotnet test --verbosity normal
          if [ $? -ne 0 ]; then
            echo "❌ Tests failed! Aborting pipeline."
            exit 1
          fi

      - name: Log in to Gitea Container Registry
        run: docker login git.tazhome.net -u chas --password-stdin <<< '${{ secrets.TOKEN_FOR_GITEA }}'

      - name: Set up Docker Buildx
        run: |
          docker buildx ls | grep -q sentinal || docker buildx create --name sentinal --driver docker-container
          docker buildx use sentinal
          docker buildx inspect --bootstrap

      - name: Build and Push Docker Image
        run: |
          docker buildx build \
            --cache-from type=registry,ref=git.tazhome.net/chas/sentinal:latest \
            --cache-to type=registry,ref=git.tazhome.net/chas/sentinal:latest,mode=max \
            --tag git.tazhome.net/chas/sentinal:latest \
            --tag git.tazhome.net/chas/sentinal:$(git rev-parse --short HEAD) \
            --push \
            .

      - name: Push to GitHub
        run: |
          rm -rf /tmp/sentinal-gh
          git clone https://github.com/scphyle/Sentinal.git /tmp/sentinal-gh
          cd /tmp/sentinal-gh
          git config user.email "ci@tazhome.net"
          git config user.name "Sentinal CI"
          git remote set-url origin https://x-access-token:${{ secrets.TOKEN_FOR_GITHUB }}@github.com/scphyle/Sentinal.git
          git fetch origin main
          git checkout main
          # Copy our files from current repo
          cp -r ../src ../sentinal-ui ../docker-compose.yml ../README.md .
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Sync from Gitea ($(git rev-parse --short HEAD))"
            git push origin main
          fi
        continue-on-error: true

      - name: Get changes since last tag
        id: changes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline)
            FILES=$(git diff --stat HEAD)
          else
            COMMITS=$(git log --oneline ${LAST_TAG}..HEAD)
            FILES=$(git diff --stat ${LAST_TAG}..HEAD)
          fi
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Gitea Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          curl -X POST "https://git.tazhome.net/api/v1/repos/chas/Sentinal/releases" \
            -H "Authorization: token ${{ secrets.TOKEN_FOR_RUNNER }}" \
            -H "Content-Type: application/json" \
            -d '{
              "tag_name": "'"$TAG_NAME"'",
              "name": "'"$TAG_NAME"'",
              "body": "Release '"$TAG_NAME"'"
            }'