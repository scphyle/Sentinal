name: Build and Deploy Sentinal to Voyager

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: git clone --depth 1 --branch ${{ github.ref_name }} https://chas:${{ secrets.TOKEN_FOR_RUNNER }}@git.tazhome.net/chas/Sentinal.git .

      - name: Build React App
        run: |
          cd sentinal-ui
          npm install
          npm run build
          cp -r dist/* ../src/Sentinal.Api/wwwroot/

      - name: Run Tests
        run: |
          dotnet test --verbosity normal
          if [ $? -ne 0 ]; then
            echo "❌ Tests failed! Aborting pipeline."
            exit 1
          fi

      - name: Log in to Gitea Container Registry
        run: docker login git.tazhome.net -u chas --password-stdin <<< '${{ secrets.TOKEN_FOR_GITEA }}'

      - name: Set up Docker Buildx
        run: |
          docker buildx ls | grep -q sentinal || docker buildx create --name sentinal --driver docker-container
          docker buildx use sentinal
          docker buildx inspect --bootstrap

      - name: Build and Push Docker Image
        run: |
          docker buildx build \
            --cache-from type=registry,ref=git.tazhome.net/chas/sentinal:latest \
            --cache-to type=registry,ref=git.tazhome.net/chas/sentinal:latest,mode=max \
            --tag git.tazhome.net/chas/sentinal:latest \
            --tag git.tazhome.net/chas/sentinal:$(git rev-parse --short HEAD) \
            --push \
            .

      - name: Push to GitHub
        run: |
          git config --global credential.helper store
          echo "https://chas:${{ secrets.TOKEN_FOR_GITHUB }}@github.com" > ~/.git-credentials
          git remote add github https://github.com/scphyle/Sentinal.git
          git push github main
          git push github --tags
        continue-on-error: true

      - name: Get changes since last tag
        id: changes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline)
            FILES=$(git diff --stat HEAD)
          else
            COMMITS=$(git log --oneline ${LAST_TAG}..HEAD)
            FILES=$(git diff --stat ${LAST_TAG}..HEAD)
          fi
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Gitea Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          curl -X POST "https://git.tazhome.net/api/v1/repos/chas/Sentinal/releases" \
            -H "Authorization: token ${{ secrets.TOKEN_FOR_RUNNER }}" \
            -H "Content-Type: application/json" \
            -d '{
              "tag_name": "'"$TAG_NAME"'",
              "name": "'"$TAG_NAME"'",
              "body": "Release '"$TAG_NAME"'"
            }'

      - name: Deploy to Voyager
        if: github.ref == 'refs/heads/main'
        run: |
          set +x  # Disable command echoing to hide secrets
          echo "${{ secrets.VOYAGER_SSH_KEY }}" > /tmp/deploy_key
          set -x  # Re-enable command echoing
          chmod 600 /tmp/deploy_key
          
          mkdir -p ~/.ssh
          ssh-keyscan -H 10.30.18.10 >> ~/.ssh/known_hosts 2>/dev/null || true
          
          # SCP the docker-compose.yml from repo to Voyager Unraid
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no docker-compose.yml ${{ secrets.VOYAGER_USER }}@10.30.18.10:/boot/config/plugins/compose.manager/projects/sentinal/
          
          # Create .env file on Voyager Unraid
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VOYAGER_USER }}@10.30.18.10 'cat > /boot/config/plugins/compose.manager/projects/sentinal/.env << EOL
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          EOL'
          
          # Deploy
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VOYAGER_USER }}@10.30.18.10 '
            cd /boot/config/plugins/compose.manager/projects/sentinal
            docker login git.tazhome.net -u chas --password-stdin <<< "${{ secrets.TOKEN_FOR_GITEA }}"
            docker compose pull
            docker compose down || true
            docker compose up -d
            docker logout git.tazhome.net
          '
          
          rm /tmp/deploy_key

      - name: Verify Deployment
        if: github.ref == 'refs/heads/main'
        run: |
          set +x  # Disable command echoing to hide secrets
          echo "${{ secrets.VOYAGER_SSH_KEY }}" > /tmp/deploy_key
          set -x  # Re-enable command echoing
          chmod 600 /tmp/deploy_key
          
          mkdir -p ~/.ssh
          ssh-keyscan -H 10.30.18.10 >> ~/.ssh/known_hosts 2>/dev/null || true
          
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VOYAGER_USER }}@10.30.18.10 '
            if docker ps | grep sentinal-api > /dev/null; then
              echo "✅ Sentinal API is running on sentinal.tazhome.net"
            else
              echo "❌ Sentinal API failed to start"
              exit 1
            fi
          '
          
          rm /tmp/deploy_key