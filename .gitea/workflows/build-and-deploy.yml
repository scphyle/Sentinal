name: Build and Deploy Sentinal to Voyager

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: git clone --depth 1 --branch ${{ github.ref_name }} https://chas:${{ secrets.TOKEN_FOR_RUNNER }}@git.tazhome.net/chas/Sentinal.git .

      - name: Build React App
        run: |
          cd sentinal-ui
          npm install
          npm run build
          cp -r dist/* ../src/Sentinal.Api/wwwroot/

      - name: Run Tests
        run: |
          dotnet test --verbosity normal
          if [ $? -ne 0 ]; then
            echo "❌ Tests failed! Aborting pipeline."
            exit 1
          fi

      - name: Log in to Gitea Container Registry
        run: docker login git.tazhome.net -u chas --password-stdin <<< '${{ secrets.TOKEN_FOR_GITEA }}'

      - name: Set up Docker Buildx
        run: |
          docker buildx ls | grep -q sentinal || docker buildx create --name sentinal --driver docker-container
          docker buildx use sentinal
          docker buildx inspect --bootstrap

      - name: Build and Push Docker Image
        run: |
          docker buildx build \
            --cache-from type=registry,ref=git.tazhome.net/chas/sentinal:latest \
            --cache-to type=registry,ref=git.tazhome.net/chas/sentinal:latest,mode=max \
            --tag git.tazhome.net/chas/sentinal:latest \
            --tag git.tazhome.net/chas/sentinal:$(git rev-parse --short HEAD) \
            --push \
            .

      - name: Push to GitHub
        run: |
          git config --global credential.helper store
          echo "https://chas:${{ secrets.TOKEN_FOR_GITHUB }}@github.com" > ~/.git-credentials
          git remote add github https://github.com/scphyle/Sentinal.git
          git push github main
          git push github --tags
        continue-on-error: true

      - name: Get changes since last tag
        id: changes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline)
            FILES=$(git diff --stat HEAD)
          else
            COMMITS=$(git log --oneline ${LAST_TAG}..HEAD)
            FILES=$(git diff --stat ${LAST_TAG}..HEAD)
          fi
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Gitea Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          curl -X POST "https://git.tazhome.net/api/v1/repos/chas/Sentinal/releases" \
            -H "Authorization: token ${{ secrets.TOKEN_FOR_RUNNER }}" \
            -H "Content-Type: application/json" \
            -d '{
              "tag_name": "'"$TAG_NAME"'",
              "name": "'"$TAG_NAME"'",
              "body": "Release '"$TAG_NAME"'"
            }'

      - name: Deploy to Voyager
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.VOYAGER_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          
          mkdir -p ~/.ssh
          ssh-keyscan -H voyager.tazhome.net >> ~/.ssh/known_hosts 2>/dev/null || true
          
          # Create docker-compose for deployment
          cat > docker-compose.deploy.yml << COMPOSE
          version: '3.8'
          services:
            sentinal-db:
              image: postgres:16-alpine
              container_name: sentinal-db
              restart: unless-stopped
              environment:
                POSTGRES_USER: sentinal
                POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
                POSTGRES_DB: sentinal
              volumes:
                - sentinal-pgdata:/var/lib/postgresql/data
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U sentinal"]
                interval: 5s
                timeout: 5s
                retries: 5
          
            sentinal-api:
              image: git.tazhome.net/chas/sentinal:latest
              container_name: sentinal-api
              restart: unless-stopped
              depends_on:
                sentinal-db:
                  condition: service_healthy
              environment:
                ASPNETCORE_ENVIRONMENT: Production
                ASPNETCORE_HTTP_PORTS: 8080
                ConnectionStrings__DefaultConnection: "Host=sentinal-db;Port=5432;Database=sentinal;Username=sentinal;Password=${POSTGRES_PASSWORD}"
                Jwt__Secret: ${JWT_SECRET}
                Jwt__Issuer: Sentinal
                Jwt__Audience: SentinalUsers
                FileStorage__StorageProvider: Local
                FileStorage__BasePath: /data/files
              ports:
                - "8080:8080"
              volumes:
                - sentinal-file-storage:/data/files
              networks:
                - sentinal-network
          
          networks:
            sentinal-network:
              driver: bridge
          
          volumes:
            sentinal-pgdata:
            sentinal-file-storage:
          COMPOSE
          
          # SCP the compose file to Voyager
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no docker-compose.deploy.yml ${{ secrets.VOYAGER_USER }}@voyager.tazhome.net:/home/${{ secrets.VOYAGER_USER }}/sentinal/docker-compose.yml
          
          # Create .env file on Voyager
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VOYAGER_USER }}@voyager.tazhome.net 'cat > /home/${{ secrets.VOYAGER_USER }}/sentinal/.env << EOL
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          EOL'
          
          # Deploy
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VOYAGER_USER }}@voyager.tazhome.net '
            cd /home/${{ secrets.VOYAGER_USER }}/sentinal
            docker login git.tazhome.net -u chas --password-stdin <<< "${{ secrets.TOKEN_FOR_GITEA }}"
            docker compose pull
            docker compose down || true
            docker compose up -d
            docker logout git.tazhome.net
          '
          
          rm /tmp/deploy_key

      - name: Verify Deployment
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.VOYAGER_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          
          mkdir -p ~/.ssh
          ssh-keyscan -H voyager.tazhome.net >> ~/.ssh/known_hosts 2>/dev/null || true
          
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VOYAGER_USER }}@voyager.tazhome.net '
            if docker ps | grep sentinal-api > /dev/null; then
              echo "✅ Sentinal API is running on sentinal.tazhome.net"
            else
              echo "❌ Sentinal API failed to start"
              exit 1
            fi
          '
          
          rm /tmp/deploy_key